<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cardápio Becoartes - Culinária Nordestina">
    <title>Cardápio - Becoartes</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #9d4edd;
            --secondary: #ffdd00;
            --bg: #15151a;
            --text: #ffffff;
            --text-muted: #9ca3af;
        }
        
        body {
            font-family: 'Jost', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, rgba(157,78,221,0.1) 0%, transparent 100%);
        }
        
        .header-section h1 {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        /* Menu Section */
        .menu-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }
        
        .menu-category {
            margin-bottom: 50px;
        }
        
        .menu-category h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .menu-item {
            padding: 30px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s ease;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-3px);
        }
        
        .menu-item span {
            font-size: 20px;
            font-weight: 500;
        }
        
        /* CTA Section */
        .cta-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, transparent 0%, rgba(157,78,221,0.1) 100%);
        }
        
        .cta-button {
            display: inline-block;
            padding: 16px 40px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(157,78,221,0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
            
            .header-section h1 {
                font-size: 36px;
            }
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header-section">
        <h1>Cardápio</h1>
    </div>
    
    <div class="menu-section">
        <div class="menu-category">
            <h2>Principais</h2>
            <div class="menu-grid">
                <div class="menu-item"><span>Baião de Dois</span></div>
                <div class="menu-item"><span>Espeto de Mignon</span></div>
                <div class="menu-item"><span>Costela no Bafo</span></div>
            </div>
        </div>
        
        <div class="menu-category">
            <h2>Bebidas</h2>
            <div class="menu-grid">
                <div class="menu-item"><span>VIRTUAL</span></div>
                <div class="menu-item"><span>CAIPIRINHA</span></div>
                <div class="menu-item"><span>CERVEJA LATÃO</span></div>
                <div class="menu-item"><span>ÁGUA</span></div>
                <div class="menu-item"><span>REFRIGERANTE</span></div>
                <div class="menu-item"><span>SUCO</span></div>
            </div>
        </div>
    </div>
    
    <div class="cta-section">
        <a href="https://www.becoartes.com/contato" class="cta-button">Reserve sua mesa</a>
    </div>
    
    <footer>
        <p>© Becoartes 2025</p>
    </footer>
</body>
</html>
