<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Becoartes - Experiência 3D Brutal">
    <title>Experiência 3D - Becoartes</title>
    <script src="https://unpkg.com/@splinetool/viewer@1.0.54/build/spline-viewer.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0f;
            --primary: #9d4edd;
            --secondary: #ffdd00;
            --cyan: #00f5ff;
            --pink: #ff006e;
            --orange: #ff9500;
            --green: #00ff88;
            --red: #ff3333;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
            cursor: crosshair;
        }
        
        /* Brutalist Cursor */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.03) 2px,
                    rgba(255, 255, 255, 0.03) 4px
                );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* Glitch Effect */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        @keyframes rgbShift {
            0% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; }
            50% { text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
            100% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; }
        }
        
        /* Hero Brutal */
        .hero-brutal {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                radial-gradient(circle at 30% 30%, rgba(157, 78, 221, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(255, 221, 0, 0.3) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px),
                var(--bg);
        }
        
        .hero-brutal::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 50px,
                rgba(255, 0, 0, 0.1) 50px,
                rgba(255, 0, 0, 0.1) 51px
            );
            pointer-events: none;
        }
        
        .brutal-title {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.85;
            position: relative;
            z-index: 10;
            animation: rgbShift 0.5s infinite;
            mix-blend-mode: difference;
        }
        
        .brutal-title span {
            display: block;
            background: linear-gradient(90deg, #fff, var(--cyan), var(--pink), var(--orange), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientMove 3s linear infinite;
        }
        
        @keyframes gradientMove {
            to { background-position: 200% center; }
        }
        
        .brutal-subtitle {
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            margin-top: 2rem;
            color: var(--cyan);
            text-transform: uppercase;
            font-weight: 300;
        }
        
        /* Brutal Menu */
        .brutal-menu {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 3px solid var(--primary);
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .brutal-menu .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--secondary);
            text-decoration: none;
        }
        
        .brutal-menu nav {
            display: flex;
            gap: 2rem;
        }
        
        .brutal-menu a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            transition: all 0.1s;
        }
        
        .brutal-menu a:hover {
            border: 2px solid var(--cyan);
            background: var(--cyan);
            color: #000;
            box-shadow: 4px 4px 0 var(--primary);
        }
        
        /* Floating Brutal Elements */
        .brutal-float {
            position: absolute;
            border: 3px solid;
            animation: floatBrutal 8s ease-in-out infinite;
        }
        
        .brutal-float-1 {
            width: 200px;
            height: 200px;
            border-color: var(--primary);
            top: 15%;
            left: 10%;
            animation-delay: 0s;
            transform: rotate(15deg);
        }
        
        .brutal-float-2 {
            width: 150px;
            height: 150px;
            border-color: var(--secondary);
            bottom: 20%;
            right: 15%;
            animation-delay: -3s;
            transform: rotate(-20deg);
        }
        
        .brutal-float-3 {
            width: 100px;
            height: 100px;
            border-color: var(--cyan);
            top: 40%;
            right: 25%;
            animation-delay: -5s;
            transform: rotate(45deg);
        }
        
        @keyframes floatBrutal {
            0%, 100% { transform: rotate(15deg) translate(0, 0); }
            33% { transform: rotate(20deg) translate(20px, -20px); }
            66% { transform: rotate(10deg) translate(-20px, 20px); }
        }
        
        /* Cards Brutal */
        .brutal-cards {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            z-index: 10;
        }
        
        .brutal-card {
            width: 120px;
            height: 120px;
            background: #000;
            border: 3px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }
        
        .brutal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .brutal-card:hover::before {
            left: 100%;
        }
        
        .brutal-card:hover {
            transform: translateY(-15px) rotate(-5deg);
            box-shadow: 8px 8px 0 var(--cyan);
            border-color: var(--cyan);
        }
        
        .brutal-card .icon { font-size: 2.5rem; }
        
        .brutal-card .label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        
        /* Instructions */
        .brutal-instruct {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 2px solid var(--orange);
            padding: 0.8rem 2rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--orange);
            z-index: 100;
        }
        
        /* Spline container */
        .spline-brutal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            z-index: 1;
            opacity: 0.6;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .brutal-title { font-size: 3rem; }
            .brutal-menu { flex-direction: column; gap: 1rem; }
            .brutal-menu nav { flex-wrap: wrap; }
            .brutal-cards { flex-wrap: wrap; width: 90%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- Menu -->
    <nav class="brutal-menu">
        <a href="index.html" class="logo">BECOARTES</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="loja.html">Loja</a>
            <a href="blog.html">Guia</a>
        </nav>
    </nav>
    
    <!-- Hero -->
    <section class="hero-brutal">
        <div class="spline-brutal">
            <spline-viewer url="https://prod.spline.design/6Wq1Q7YGyM-iab9i/scene.splinecode"></spline-viewer>
        </div>
        
        <h1 class="brutal-title">
            <span>BECO</span>
            <span>ARTES</span>
        </h1>
        
        <p class="brutal-subtitle">Experiência brutal</p>
        
        <!-- Floating elements -->
        <div class="brutal-float brutal-float-1"></div>
        <div class="brutal-float brutal-float-2"></div>
        <div class="brutal-float brutal-float-3"></div>
        
        <!-- Cards -->
        <div class="brutal-cards">
            <div class="brutal-card">
                <span class="icon">🎨</span>
                <span class="label">Arte</span>
            </div>
            <div class="brutal-card">
                <span class="icon">🍽️</span>
                <span class="label">Comida</span>
            </div>
            <div class="brutal-card">
                <span class="icon">🎵</span>
                <span class="label">Cultura</span>
            </div>
            <div class="brutal-card">
                <span class="icon">📍</span>
                <span class="label">Vila</span>
            </div>
        </div>
    </section>
    
    <div class="brutal-instruct">
        [ MOUSE MOVE TO INTERACT ] /// [ CLICK TO SELECT ] /// [ SCROLL TO NAVIGATE ]
    </div>
    
    <script>
        // Brutal cursor effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Create massive trail
            for(let i = 0; i < 3; i++) {
                const trail = document.createElement('div');
                trail.style.cssText = `
                    position: fixed;
                    left: ${x + (Math.random() - 0.5) * 50}px;
                    top: ${y + (Math.random() - 0.5) * 50}px;
                    width: ${Math.random() * 30 + 10}px;
                    height: ${Math.random() * 30 + 10}px;
                    background: hsl(${Math.random() * 360}, 100%, 50%);
                    opacity: 0.3;
                    pointer-events: none;
                    z-index: 9998;
                `;
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 300);
            }
        });
        
        // Click brutal effect
        document.addEventListener('click', () => {
            document.body.style.animation = 'glitch 0.1s';
            setTimeout(() => document.body.style.animation = '', 100);
        });
        
        console.log('⚡ BECOARTES BRUTAL MODE ACTIVATED');
    </script>
</body>
</html>
